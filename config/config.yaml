broker_mode: mock
initial_capital: 50000
daily_profit_target: 50
data_source: tencent
strategy:
  exclude_sectors: []
  max_per_sector: 2
  max_positions: 10
  max_sector_pct: 30
  max_single_pct: 25
  min_buy_amount: 2000
  position_sizing: atr
  safe_gain_range:
  - -3
  - 3
  type: trend
risk:
  circuit_breaker: true
  max_daily_drawdown: -3
  max_holding_days: 20
  max_total_loss_pct: -10
  stop_loss_pct: -8
  take_profit_pct: 10
simulation:
  commission_rate: 0.00025
  min_commission: 5
  slippage_pct: 0.1
  stamp_tax_rate: 0.001
  transfer_fee_rate: 1.0e-05
  use_realtime: true
live:
  commission_rate: 0.00025
  max_order_count: 10
  min_commission: 5
  order_timeout: 30
  price_strategy: 0
  retry_count: 3
  retry_interval: 1
  slippage: 0.01
  stamp_tax_rate: 0.001
  transfer_fee_rate: 1.0e-05
qmt:
  account_id: ''
  mini_qmt_path: ''
llama:
  models:
    qwen_normal:
      ctx_size: 131072
      model_path: ''
      n_batch: 8192
      n_gpu_layers: 26
      n_ubatch: 8192
    qwen_uncensored:
      ctx_size: 32768
      model_path: ''
      n_batch: 512
      n_gpu_layers: 32
      n_ubatch: 512
  server_path: ''
easytrader_path: auto
tdx_path: auto
notify:
  chat_id: ''
  telegram_token: ''
  webhook: ''
  enabled: true
  dedup_window_seconds: 300
scanner:
  auto_run: false
  interval_seconds: 60
  top_n: 30
  alert_score_threshold: 80
  critical_score_threshold: 90
poll_interval: 300
broker:
  account_id: '8881541669'
  client_path: D:\国金证券QMT交易端\userdata_mini
  type: qmt
  mode: paper
  qmt_enabled: false
market_data:
  allow_fallback_for_research_only: false
  freeze_on_stale_data: true
  max_delay_seconds: 5
  primary_provider: qmt
news_data:
  allow_state_mutation: false
  allow_trade_trigger: false
  enabled: true
  health_file: data_cache/news_health.json
  providers:
    cls:
      enabled: true
      poll_interval_seconds: 60
      timeout_seconds: 5
    cninfo:
      enabled: true
      poll_interval_seconds: 300
      timeout_seconds: 8
      max_pages: 5                  # 翻页数 (双栏目各5页, 约300条)
      recent_hours: 24              # 时间窗口
    eastmoney:
      enabled: true
      poll_interval_seconds: 600
      timeout_seconds: 15
      symbol_count: 25              # 每轮拉取的股票数
      news_per_symbol: 20           # 每只股票最多拉取新闻数
      max_pages: 5                  # 最大翻页数 (totalCount驱动, 实际不超过此值)
      recent_hours: null            # 时间窗口过滤 (null=不过滤)
      categories:                   # 栏目列表
        - stock                     # 个股新闻
        - announcement              # 公告
        - report                    # 研报
        - flash                     # 7x24快讯
        - sector                    # 板块资讯
    sse:
      enabled: true
      poll_interval_seconds: 600    # 上交所公告 (公告量大, 10分钟合适)
      timeout_seconds: 15
      max_pages: 5                  # 最大翻页数 (约150条)
      recent_hours: 24              # 时间窗口 (仅抓取最近24小时)
    szse:
      enabled: true
      poll_interval_seconds: 600    # 深交所公告 (与SSE同步)
      timeout_seconds: 15
      max_pages: 5                  # 最大翻页数 (约150条)
      recent_hours: 24              # 时间窗口 (仅抓取最近24小时)
    rss:
      enabled: true
      poll_interval_seconds: 600    # RSS聚合 (低优先级, 10分钟)
      timeout_seconds: 15
      feeds:                        # Feed 源列表 (支持json_api/rss_atom)
        - name: "sina_finance"
          type: "json_api"
          url: "https://feed.mix.sina.com.cn/api/roll/get?pageid=153&lid=2509&k=&num=20&page=1"
          data_path: "result.data"
          timeout_seconds: 10
          weight: 1.0              # 权重 (1.0=全量, 0=禁用)
        - name: "sina_astock"
          type: "json_api"
          url: "https://feed.mix.sina.com.cn/api/roll/get?pageid=153&lid=2512&k=&num=20&page=1"
          data_path: "result.data"
          timeout_seconds: 10
          weight: 0.8              # A股降权0.8
  readonly: true
  store:
    path: data_cache/news_events.db
    type: sqlite
  # ── 覆盖率门控 ──
  coverage_gate:
    enabled: true
    healthy_threshold: 0.20     # ≥20% → 资讯因子权重 100%
    weak_threshold: 0.05        # ≥5%  → 资讯因子权重 30%
    # coverage < 5% → 资讯因子权重 0% (禁用)
    cache_ttl_seconds: 600      # 覆盖率缓存 10 分钟
hyperparams:
  atr_period: 14
  risk_per_trade: 0.008
  stop_loss_pct: -0.05
  max_single_pct: 25
